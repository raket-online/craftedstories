<!--
  ============================================================
  Crafted Stories — Curo-versie van index.html
  ============================================================
  Dit is een preview-bestand: de browser laadt 'crafted-stories.css'
  zodat je het lokaal kunt bekijken. In Curo zelf staat die CSS in
  BrandingData.customCss (zie generateSiteCSS in
  server/utils/site-styles.ts).

  Drie blokken hieronder, één-op-één te kopiëren naar Curo:

    [1]  <!-- BEGIN layout.header -->  →  siteData.layout.header
    [2]  <!-- BEGIN page.content -->   →  Page.content (homepage)
    [3]  <!-- BEGIN layout.footer -->  →  siteData.layout.footer
         (incl. <script> aan het eind voor mobile-menu,
          taal-toggle en scroll-reveal)

  BrandingData kleurkeuze:
    primary   = #941a10
    secondary = #6d1209
    accent    = #b82214
    neutral   = #6b5a52
    text      = #2c1810

  Headings vereisen Playfair Display (Lato voor body). Configureer
  hiervoor de Curo designStyle die ze laadt (bv. 'editorial'), of
  voeg in layout.header een <link> naar Google Fonts toe.
  ============================================================
-->

<div class="cs">

  <main id="main">

    <!-- ===== HERO ===== -->
    <section class="cs-hero cs-pattern" aria-labelledby="hero-heading">
      <div class="cs-container cs-grid cs-grid--hero cs-grid--items-center cs-hero__inner">

        <div class="cs-hero__text">
          <p class="cs-eyebrow" style="margin-bottom: 1.5rem;">
            <span data-lang="nl">Noordermarkt &middot; Amsterdam &middot; Jordaan</span>
            <span data-lang="en">Noordermarkt &middot; Amsterdam &middot; Jordaan</span>
          </p>

          <h1 id="hero-heading" class="cs-h1">
            <span data-lang="nl">Wij zien <em>jou.</em></span>
            <span data-lang="en">We see <em>you.</em></span>
          </h1>

          <p class="cs-lead cs-hero__lead" data-lang="nl">
            Crafted Stories is meer dan een winkel. Het is een plek waar handgemaakte producten een verhaal vertellen &mdash; over hoop, over vakmanschap, over nieuwe kansen.
          </p>
          <p class="cs-lead cs-hero__lead" data-lang="en">
            Crafted Stories is more than a shop. It&rsquo;s a place where handcrafted products tell a story &mdash; about hope, craftsmanship, and second chances.
          </p>

          <div class="cs-hero__actions">
            <a href="/over-ons" class="cs-btn cs-btn--primary">
              <span data-lang="nl">Ontdek ons verhaal</span>
              <span data-lang="en">Discover our story</span>
            </a>
            <a href="/producten" class="cs-btn cs-btn--outline">
              <span data-lang="nl">Bekijk collectie</span>
              <span data-lang="en">View collection</span>
            </a>
          </div>
        </div>

        <div class="cs-hero__media">
          <div class="cs-frame">
            <img src="images/IMG-20260319-WA0003.jpg" alt="Interieur van Crafted Stories">
            <div class="cs-frame__accent" aria-hidden="true"></div>
          </div>
        </div>
      </div>

      <div class="cs-hero__scroll" aria-hidden="true">
        <span data-lang="nl">Ontdek meer</span>
        <span data-lang="en">Discover more</span>
        <div class="cs-hero__scroll-line"></div>

    <!-- ===== INTRO ===== -->
    <section class="cs-section" aria-labelledby="intro-heading">
      <div class="cs-container cs-container--narrow cs-reveal" style="text-align:center;">
        <p class="cs-eyebrow">
          <span data-lang="nl">Wie we zijn</span>
          <span data-lang="en">Who we are</span>
        </p>
        <h2 id="intro-heading" class="cs-h2 cs-h2--lg">
          <span data-lang="nl">Elk product vertelt een verhaal</span>
          <span data-lang="en">Every product tells a story</span>
        </h2>

        <p class="cs-lead" data-lang="nl">
          In onze winkel aan de Noordermarkt vind je handgemaakte cadeaus, eerlijke lifestyle producten en tweedehands kleding. Maar het bijzondere zit niet alleen in wat we verkopen &mdash; het zit in wie het maakt, en wat jouw aankoop betekent.
        </p>
        <p class="cs-lead" data-lang="en">
          In our shop at the Noordermarkt you&rsquo;ll find handcrafted gifts, fair lifestyle products and secondhand clothing. But what makes us special isn&rsquo;t just what we sell &mdash; it&rsquo;s who makes it, and what your purchase means.
        </p>

        <p class="cs-lead" data-lang="nl" style="margin-top:1rem;">
          Onze producten worden gemaakt door mensen die een eerlijke kans verdienen. In onze winkel werken mensen uit kwetsbare doelgroepen die bij ons de ruimte krijgen om te groeien. Zelfs door een koffie te drinken bij ons draag je bij aan een stukje hoop.
        </p>
        <p class="cs-lead" data-lang="en" style="margin-top:1rem;">
          Our products are made by people who deserve a fair chance. In our shop, people from vulnerable backgrounds find a safe place to grow. Even by having a coffee with us, you&rsquo;re contributing to someone&rsquo;s hope for a better future.
        </p>
      </div>
    </section>

    <!-- ===== DRIE VERHALEN ===== -->
    <section class="cs-section cs-pattern" aria-labelledby="stories-heading">
      <div class="cs-container">
        <div class="cs-reveal" style="text-align:center; margin-bottom: 4rem;">
          <p class="cs-eyebrow cs-eyebrow--sm">
            <span data-lang="nl">Verhalen uit de winkel</span>
            <span data-lang="en">Stories from the shop</span>
          </p>
          <h2 id="stories-heading" class="cs-h2">
            <span data-lang="nl">Hoop heeft vele gezichten</span>
            <span data-lang="en">Hope has many faces</span>
          </h2>
          <div class="cs-divider"></div>
        </div>

        <div class="cs-grid cs-grid--3">

          <article class="cs-card cs-reveal" aria-labelledby="story-1">
            <img src="images/IMG-20260319-WA0007.jpg" alt="Kleurrijke kussens en textielproducten in de winkel">
            <div class="cs-card__body">
              <p class="cs-eyebrow" style="margin-bottom:.5rem;">
                <span data-lang="nl">De makers</span><span data-lang="en">The makers</span>
              </p>
              <h3 id="story-1" class="cs-h3">
                <span data-lang="nl">Vilten met gevoel</span>
                <span data-lang="en">Felt with feeling</span>
              </h3>
              <p class="cs-body--sm" data-lang="nl">
                In India werkt een groep blinde ambachtslieden in een van de ateliers van Sjaal met Verhaal. Mensen die normaal weinig kans hebben op werk, maken hier prachtige viltproducten. Een eerlijk loon, een veilige werkplek &mdash; en producten die jij in onze winkel vindt.
              </p>
              <p class="cs-body--sm" data-lang="en">
                In India, a group of blind artisans work in one of the ateliers of Sjaal met Verhaal. People who normally have little chance of employment create beautiful felt products here. A fair wage, a safe workplace &mdash; and products you&rsquo;ll find in our shop.
              </p>
            </div>
          </article>

          <article class="cs-card cs-reveal" style="transition-delay:.15s" aria-labelledby="story-2">
            <img src="images/IMG-20260319-WA0011.jpg" alt="Handgemaakte cadeaus en keramiek">
            <div class="cs-card__body">
              <p class="cs-eyebrow" style="margin-bottom:.5rem;">
                <span data-lang="nl">Nieuw begin</span><span data-lang="en">New beginnings</span>
              </p>
              <h3 id="story-2" class="cs-h3">
                <span data-lang="nl">Sieraden van hars en hoop</span>
                <span data-lang="en">Jewellery of resin and hope</span>
              </h3>
              <p class="cs-body--sm" data-lang="nl">
                In Brazili&euml; maken vrouwen die uit de sekswerkindustrie zijn gestapt prachtige sieraden van hars. Ze kozen voor een ander leven en vonden een veilige werkplek, een opleiding en een eerlijk inkomen. Hun sieraden dragen een verhaal van moed en een nieuw begin.
              </p>
              <p class="cs-body--sm" data-lang="en">
                In Brazil, women who left the sex trade create beautiful resin jewellery. They chose a different life and found a safe workplace, training and a fair income. Their jewellery carries a story of courage and new beginnings.
              </p>
            </div>
          </article>

          <article class="cs-card cs-reveal" style="transition-delay:.3s" aria-labelledby="story-3">
            <img src="images/IMG-20260319-WA0009.jpg" alt="Toonbank van Crafted Stories">
            <div class="cs-card__body">
              <p class="cs-eyebrow" style="margin-bottom:.5rem;">
                <span data-lang="nl">Onze winkel</span><span data-lang="en">Our shop</span>
              </p>
              <h3 id="story-3" class="cs-h3">
                <span data-lang="nl">Een opstapje naar de toekomst</span>
                <span data-lang="en">A stepping stone to the future</span>
              </h3>
              <p class="cs-body--sm" data-lang="nl">
                In onze winkel werken mensen uit kwetsbare doelgroepen. Ze leren hier alles &mdash; van barista zijn tot klanten helpen. Een veilige plek om zichzelf te ontdekken en te groeien. Na een half jaar stromen ze door naar een betaalde baan. Dat is hoop in de praktijk.
              </p>
              <p class="cs-body--sm" data-lang="en">
                In our shop, people from vulnerable backgrounds find a place to learn and grow &mdash; from making coffee to helping customers. A safe space to discover themselves. After six months, they move on to paid employment. That&rsquo;s hope in action.
              </p>
            </div>
          </article>

        </div>

        <div class="cs-reveal" style="text-align:center; margin-top: 3.5rem;">
          <a href="/over-ons" class="cs-readmore">
            <span data-lang="nl">Lees meer verhalen</span>
            <span data-lang="en">Read more stories</span>
            <span aria-hidden="true">&rarr;</span>
          </a>
        </div>
      </div>

<script>
(function () {
  'use strict';

  // ----- Mobile menu -----
  var toggle = document.getElementById('mobile-toggle');
  var menu   = document.getElementById('mobile-menu');
  if (toggle && menu) {
    toggle.addEventListener('click', function () {
      var open = menu.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', String(open));
      toggle.setAttribute('aria-label', open ? 'Menu sluiten' : 'Menu openen');
    });
  }

  // ----- Taal-toggle (NL / EN) -----
  function setLang(lang) {
    document.documentElement.lang = lang;
    var isNL = lang === 'nl';
    document.querySelectorAll('.lang-toggle-btn').forEach(function (btn) {
      var flag = btn.querySelector('.lang-flag');
      var code = btn.querySelector('.lang-code');
      if (flag) flag.textContent = isNL ? '🇬🇧' : '🇳🇱';
      if (code) code.textContent = isNL ? 'EN' : 'NL';
      btn.setAttribute('aria-label', isNL ? 'Switch to English' : 'Naar Nederlands');
    });
    try { localStorage.setItem('cs-lang', lang); } catch (e) {}
  }
  function detectLang() {
    try {
      var s = localStorage.getItem('cs-lang');
      if (s === 'nl' || s === 'en') return s;
    } catch (e) {}
    var bl = (navigator.language || 'en').toLowerCase();
    return bl.indexOf('nl') === 0 ? 'nl' : 'en';
  }
  setLang(detectLang());
  document.querySelectorAll('.lang-toggle-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      setLang(document.documentElement.lang === 'nl' ? 'en' : 'nl');
    });
  });

  // ----- Scroll-reveal -----
  var reveals = document.querySelectorAll('.cs-reveal');
  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) e.target.classList.add('is-visible');
      });
    }, { threshold: 0.1 });
    reveals.forEach(function (el) { io.observe(el); });
  } else {
    reveals.forEach(function (el) { el.classList.add('is-visible'); });
  }
})();
</script>
